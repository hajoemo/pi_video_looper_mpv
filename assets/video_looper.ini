# video_looper.ini
# Main configuration file for mpv_video_looper.
#
# The video_looper works right out of the box by playing any video files found
# in the root directory of an attached USB drive using mpv as the player.
# Lines beginning with # are comments and will be ignored.
# Uncomment (activate) a line by removing its leading # character.
# Use ./reload.sh to restart the looper with updated settings.

[video_looper]

# Which player to use. Can be: mpv or image_player.
# mpv plays video (and audio) in virtually any format.
# image_player displays still images as a slideshow (configure in [image_player] section).
video_player = mpv
#video_player = image_player

# File source. Can be: usb_drive, directory, or usb_drive_copymode.
# usb_drive: auto-mount any inserted USB drive and scan its root for media.
# directory: scan a fixed local directory (see [directory] section).
# usb_drive_copymode: copy files from USB to the local directory, then play.
file_reader = usb_drive
#file_reader = directory
#file_reader = usb_drive_copymode

# On Screen Display. Show informational messages (file count, countdown, etc.)
osd = true
#osd = false

# How many seconds the OSD countdown is shown before playback begins.
countdown_time = 5

# Wait time in seconds between each video. 0 = no gap.
wait_time = 0

# Display the current date/time between videos.
datetime_display = false
#datetime_display = true

# Format for top (large) and bottom (small) datetime lines.
# See: https://docs.python.org/3/library/datetime.html#strftime-format-codes
top_datetime_display_format = %H:%M:%S
bottom_datetime_display_format = %A %d %B %Y

# Play files in random order.
is_random = false
#is_random = true

# When random is enabled, don't repeat a file until all have been played once.
is_random_unique = false
#is_random_unique = true

# Resume the last-played file on restart.
resume_playlist = false
#resume_playlist = true

# Stop playback after each file (useful with GPIO triggers).
one_shot_playback = false
#one_shot_playback = true

# Start playing immediately on boot. Set to false to wait for a GPIO/keyboard trigger.
play_on_startup = true
#play_on_startup = false

# Path to a background image shown between videos.
# Leave empty for a solid color background.
bgimage =
#bgimage = /home/pi/background.png

# Background color as R,G,B (0-255). Default black.
bgcolor = 0, 0, 0

# Foreground (text) color as R,G,B (0-255). Default white.
fgcolor = 255, 255, 255

# Print detailed state info to stdout (useful for debugging/SSH monitoring).
console_output = false
#console_output = true

[control]

# Enable keyboard control (see README for key bindings).
keyboard_control = true
#keyboard_control = false

# Disable keyboard control while a video is actively playing.
# Most useful with one_shot_playback = true.
keyboard_control_disabled_while_playback = false
#keyboard_control_disabled_while_playback = true

# GPIO pin map (BOARD numbering). Bridge a pin to Ground to trigger.
# Accepted formats:
#   "pin" : index        -> jump to file at that playlist index (0-based)
#   "pin" : "filename"   -> play a specific file by name
#   "pin" : "+n"/"-n"    -> relative jump forward/back by n files
#   "pin" : "K_SPACE"    -> send a keyboard command (pygame key name)
gpio_pin_map =
#gpio_pin_map = "11" : 1, "13": 4, "16": "+2", "18": "-1", "15": "video.mp4", "19": "K_SPACE", "21": "K_p"

# Pull GPIO pins HIGH (true, default) or LOW (false).
gpio_pin_mode = true
#gpio_pin_mode = false

# Disable GPIO control while a video is playing.
gpio_control_disabled_while_playback = false
#gpio_control_disabled_while_playback = true

[usb_drive]

# Base mount path. An incrementing number is appended per drive.
mount_path = /mnt/usbdrive

# Mount USB drives read-only (recommended for reliability).
readonly = true

[directory]

# Path to scan when file_reader = directory or usb_drive_copymode destination.
path = /home/pi/video

[copymode]

# What to do when a USB drive is inserted in copymode.
# replace: delete existing videos, copy new ones.
# add:     keep existing videos, add new ones (same-name files are overwritten).
mode = replace
#mode = add

# Copy loader.png from the USB drive to use as the background image.
copyloader = false
#copyloader = true

# "Password" filename that must exist on the USB drive before files are copied.
# Change this to something unique for your installation.
# Set empty to disable the check.
password = videopi

[playlist]

# Optional M3U playlist file. Leave empty to play all files in file_reader path.
# Relative paths are resolved from the file_reader root.
path =
#path = playlist.m3u

[mpv]

# Supported video file extensions (comma separated, no leading dot).
extensions = avi, mov, mkv, mp4, m4v, webm, flv, wmv, ts, m2ts

# Audio output device. Leave empty for system default.
# Run: mpv --audio-device=help  to list available devices.
audio_device =
#audio_device = alsa/default

# Volume (0–100). Default 100.
volume = 100

# Show video titles during playback (from playlist #EXTINF or filename).
show_titles = false
#show_titles = true

# How many seconds to show the title. -1 = until next video.
title_duration = 4

# Extra mpv command-line arguments. Use with care.
# See: https://mpv.io/manual/stable/ for all options.
extra_args =
#extra_args = --vo=gpu --hwdec=auto

[image_player]

# Supported image extensions when using image_player mode.
extensions = jpg, jpeg, gif, png, bmp, webp

# How many seconds each image is displayed.
duration = 5

# Scale images to fill the display.
scale = true
#scale = false

# Center images on screen.
center = true
#center = false
